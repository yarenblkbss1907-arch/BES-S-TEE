<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş BES Planlayıcı - Kısıtlanmış Reel Getiri</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
            --info-color: #3498db;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 1100px; width: 100%; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; font-size: 1.8rem; }
        
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .field { display: flex; flex-direction: column; position: relative; }
        
        label { font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; color: #444; display: flex; align-items: center; }
        .help-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: var(--info-color);
            color: white;
            border-radius: 50%;
            font-size: 11px;
            margin-left: 6px;
            cursor: pointer;
            position: relative;
        }

        .help-icon:hover::after {
            content: attr(data-info);
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            width: 250px;
            z-index: 100;
            text-align: center;
            font-weight: normal;
            line-height: 1.4;
        }

        input { padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 1.1rem; transition: 0.3s; }
        input:focus { border-color: var(--info-color); outline: none; }
        
        button { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219150; transform: translateY(-2px); }

        .results { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .res-box { flex: 1; min-width: 200px; padding: 25px; border-radius: 15px; text-align: center; background: #fff; border: 1px solid #eee; transition: 0.3s; }
        .res-box small { display: block; font-size: 0.9rem; color: #7f8c8d; margin-bottom: 8px; }
        .res-box strong { font-size: 1.4rem; color: var(--primary); }
        
        .chart-container { margin-top: 50px; background: #fff; border-radius: 15px; padding: 20px; border: 1px solid #eee; position: relative; height: 600px; width: 100%; }
        canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 BES Gelecek Planlaması</h2>
    
    <div class="input-grid">
        <div class="field">
            <label>Yaş 
                <span class="help-icon" data-info="Sisteme girdiğiniz yaşınız">?</span>
            </label>
            <input type="number" id="v_giris" value="25">
        </div>
        
        <div class="field">
            <label>Emeklilik Yaşı 
                <span class="help-icon" data-info="Sistemde 10 yıl kalıp 56 yaşınızı doldurunca hak kazanırsınız. Ama 56 yaşında olmak zorunda değilsiniz.">?</span>
            </label>
            <input type="number" id="v_hedef" value="56">
        </div>

        <div class="field">
            <label>Aylık Katkı Payı (TL) 
                <span class="help-icon" data-info="Aylık düzenli olarak ödenen miktar">?</span>
            </label>
            <input type="number" id="v_aylik" value="2000">
        </div>

        <div class="field">
            <label>Yıllık Katkı Artışı (%) 
                <span class="help-icon" data-info="Her yıl reel olarak artacağı oranı temsil eder.">?</span>
            </label>
            <input type="number" id="v_artis" value="10">
        </div>

        <div class="field">
            <label>Yıllık Reel Getiri (%) [Maks 4]
                <span class="help-icon" data-info="Enflasyondan arındırılmış gerçek satın alma artışını ifade eder. Maksimum %4 girilebilir.">?</span>
            </label>
            <input type="number" id="v_getiri" value="4" min="0" max="4" step="0.1">
        </div>
    </div>

    <button onclick="hesapla()">Hesapla ve Analiz Et</button>

    <div class="results">
        <div class="res-box" style="border-top: 5px solid #3498db;">
            <small>Toplam Katkı Payı</small>
            <strong id="out_ana">0 TL</strong>
        </div>
        <div class="res-box" style="border-top: 5px solid #f1c40f;">
            <small>Tahmini Reel Getiri</small>
            <strong id="out_getiri">0 TL</strong>
        </div>
        <div class="res-box" style="border-top: 5px solid #e74c3c;">
            <small>Devlet Katkısı (%20)</small>
            <strong id="out_devlet">0 TL</strong>
        </div>
        <div class="res-box" style="background: #2ecc71; color: white; border: none;">
            <small style="color: #f1f1f1;">Toplam Birikim</small>
            <strong id="out_toplam" style="font-size: 1.8rem;">0 TL</strong>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="besChart"></canvas>
    </div>
</div>

<script>
let chartInstance = null;

function hesapla() {
    const giris = parseInt(document.getElementById('v_giris').value);
    const hedef = parseInt(document.getElementById('v_hedef').value);
    let aylik = parseFloat(document.getElementById('v_aylik').value);
    const artis = parseFloat(document.getElementById('v_artis').value) / 100;
    
    let getiriInput = document.getElementById('v_getiri');
    let getiriDegeri = parseFloat(getiriInput.value);
    if(getiriDegeri > 4) {
        getiriDegeri = 4;
        getiriInput.value = 4;
    }
    const getiri = getiriDegeri / 100;

    const yil = hedef - giris;
    if(yil <= 0) return alert("Emeklilik yaşı, giriş yaşınızdan büyük olmalıdır!");

    let anaPara = 0;
    let toplamBirikim = 0;
    let devletKatkisi = 0;

    let labels = [];
    let d_anaPara = [];
    let d_getiri = [];
    let d_devlet = [];

    for (let i = 1; i <= yil; i++) {
        let yillikYatirilacak = aylik * 12;
        
        anaPara += yillikYatirilacak;
        devletKatkisi += (yillikYatirilacak * 0.20); 
        
        toplamBirikim = (toplamBirikim + yillikYatirilacak) * (1 + getiri);
        let safGetiri = toplamBirikim - anaPara;

        labels.push((giris + i) + ". Yaş");
        d_anaPara.push(Math.round(anaPara));
        d_getiri.push(Math.round(safGetiri));
        d_devlet.push(Math.round(devletKatkisi));

        aylik *= (1 + artis); 
    }

    document.getElementById('out_ana').innerText = Math.round(anaPara).toLocaleString('tr-TR') + " TL";
    document.getElementById('out_getiri').innerText = Math.round(toplamBirikim - anaPara).toLocaleString('tr-TR') + " TL";
    document.getElementById('out_devlet').innerText = Math.round(devletKatkisi).toLocaleString('tr-TR') + " TL";
    document.getElementById('out_toplam').innerText = Math.round(toplamBirikim + devletKatkisi).toLocaleString('tr-TR') + " TL";

    ciz(labels, d_anaPara, d_getiri, d_devlet);
}

function ciz(labels, ana, get, dev) {
    const ctx = document.getElementById('besChart').getContext('2d');
    if(chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Katkı Payı Toplamı', data: ana, backgroundColor: '#3498db' },
                { label: 'Yıllık Reel Getiri', data: get, backgroundColor: '#f1c40f' },
                { label: 'Devlet Katkısı (%20)', data: dev, backgroundColor: '#e74c3c' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { 
                x: { 
                    stacked: true,
                    ticks: { font: { size: 14 } } 
                }, 
                y: { 
                    stacked: true, 
                    beginAtZero: true,
                    ticks: { 
                        font: { size: 14 }, 
                        callback: (v) => v.toLocaleString('tr-TR') + ' TL' 
                    }
                } 
            },
            plugins: { 
                tooltip: { 
                    mode: 'index',
                    titleFont: { size: 16 }, 
                    bodyFont: { size: 14 } 
                },
                legend: { 
                    position: 'bottom',
                    labels: { font: { size: 14 } } 
                }
            }
        }
    });
}

window.onload = hesapla;
</script>

</body>
</html>
